version: '3.9'

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: estate_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       estate_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (кэш, очереди) ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: estate_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # ── n8n ────────────────────────────────────────────────────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: estate_n8n
    restart: unless-stopped
    environment:
      N8N_HOST:                    ${N8N_HOST:-localhost}
      N8N_PORT:                    5678
      N8N_PROTOCOL:                http
      WEBHOOK_URL:                 ${N8N_WEBHOOK_URL:-http://localhost:5678}
      N8N_BASIC_AUTH_ACTIVE:       true
      N8N_BASIC_AUTH_USER:         ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD:     ${N8N_PASSWORD:-changeme}
      N8N_ENCRYPTION_KEY:          ${N8N_ENCRYPTION_KEY:-change-this-key-32chars}
      EXECUTIONS_PROCESS:          main
      EXECUTIONS_DATA_PRUNE:       true
      EXECUTIONS_DATA_MAX_AGE:     168
      DB_TYPE:                     postgresdb
      DB_POSTGRESDB_HOST:          postgres
      DB_POSTGRESDB_PORT:          5432
      DB_POSTGRESDB_DATABASE:      n8n_db
      DB_POSTGRESDB_USER:          postgres
      DB_POSTGRESDB_PASSWORD:      ${POSTGRES_PASSWORD:-secret}
      GENERIC_TIMEZONE:            Europe/Moscow
      OPENAI_API_KEY:              ${OPENAI_API_KEY}
      TELEGRAM_CHAT_ID:            ${TELEGRAM_CHAT_ID}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: 'false'
      N8N_IMPORT_WORKFLOWS_DIR:    /home/node/workflows
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/home/node/workflows
    ports:
      - '5678:5678'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:5678/healthz || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

  # ── n8n init (активация workflows) ────────────────────────────────────
  n8n-init:
    image: curlimages/curl:latest
    container_name: estate_n8n_init
    restart: on-failure
    environment:
      N8N_USER:     ${N8N_USER:-admin}
      N8N_PASSWORD: ${N8N_PASSWORD:-changeme}
    volumes:
      - ./n8n-init.sh:/n8n-init.sh
    entrypoint: sh /n8n-init.sh
    depends_on:
      n8n:
        condition: service_healthy

  # ── NestJS API ─────────────────────────────────────────────────────────
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: estate_api
    restart: unless-stopped
    environment:
      DATABASE_URL:     postgresql://postgres:${POSTGRES_PASSWORD:-secret}@postgres:5432/estate_db
      REDIS_URL:        redis://redis:6379
      JWT_SECRET:       ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN:   7d
      N8N_WEBHOOK_URL:  http://n8n:5678/webhook/events
      N8N_RECOMMENDATIONS_WEBHOOK: http://n8n:5678/webhook/recommendations
      OPENAI_API_KEY:   ${OPENAI_API_KEY}
      FRONTEND_URL:     ${FRONTEND_URL:-http://localhost:3000}
      PORT:             4000
      NODE_ENV:         production
      SWAGGER_ENABLED:  'true'
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      n8n:
        condition: service_started

  # ── Next.js Frontend ───────────────────────────────────────────────────
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL:          ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_YANDEX_MAPS_KEY:  ${NEXT_PUBLIC_YANDEX_MAPS_KEY}
        NEXT_PUBLIC_SITE_URL:         ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    container_name: estate_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      INTERNAL_API_URL: http://api:4000
      NEXT_PUBLIC_YANDEX_MAPS_KEY: ${NEXT_PUBLIC_YANDEX_MAPS_KEY}
    ports:
      - '3000:3000'
    depends_on:
      - api

  # ── Prisma Studio ──────────────────────────────────────────────────────
  prisma-studio:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: estate_prisma_studio
    restart: unless-stopped
    command: sh -c "npx prisma studio --port 5555 --browser none"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-secret}@postgres:5432/estate_db
    ports:
      - '5555:5555'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  n8n_data:
